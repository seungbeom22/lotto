<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 생성기 v1.1</title>
    <style>
        /* 기존 테마 설정 유지 */
        :root { --bg-color: #fff9e6; --text-color: #333333; --btn-color: #ffc107; --sidebar-bg: #ffffff; }
        body.theme-black { --bg-color: #1a1a1a; --text-color: #f5f5f5; --btn-color: #444444; --sidebar-bg: #2d2d2d; }
        body.theme-gray { --bg-color: #e0e0e0; --text-color: #222222; --btn-color: #757575; --sidebar-bg: #f5f5f5; }

        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Malgun Gothic', sans-serif; transition: 0.4s; text-align: center; margin: 0; padding: 20px; }
        
        /* 공 스타일: 일렬 배치 핵심 */
        .result-container { display: flex; justify-content: center; gap: 5px; margin: 30px 0; min-height: 50px; }
        .ball { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 16px; flex-shrink: 0; }
        
        /* 버튼 스타일 */
        .action-btns { margin-top: 20px; }
        button { padding: 12px 20px; margin: 5px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-gen { background-color: var(--btn-color); }
        .btn-save { background-color: #4caf50; color: white; }

        /* 기록 영역 */
        #history { margin-top: 30px; text-align: center; }
        .history-item { margin: 8px 0; font-size: 15px; }
    </style>
</head>
<body>

    <h1>🎰 행운의 로또 생성기</h1>
    
    <div class="action-btns">
        <button class="btn-gen" onclick="generateLotto()">번호 추첨하기</button>
        <button class="btn-save" onclick="saveLotto()">기록 저장하기</button>
    </div>

    <div class="result-container" id="result"></div>
    
    <div id="history">
        <h3>📜 추첨 기록</h3>
    </div>

    <script>
        let currentNumbers = []; // 현재 화면에 떠 있는 번호

        function getBallColor(num) {
            if (num <= 10) return '#fbc400';
            if (num <= 20) return '#69c8f2';
            if (num <= 30) return '#ff7272';
            if (num <= 40) return '#aaaaaa';
            return '#b0d840';
        }

        // 1. 번호 생성 (저장은 아직 안 함)
        function generateLotto() {
            currentNumbers = [];
            while(currentNumbers.length < 6) {
                const num = Math.floor(Math.random() * 45) + 1;
                if(!currentNumbers.includes(num)) currentNumbers.push(num);
            }
            currentNumbers.sort((a, b) => a - b);

            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '';
            currentNumbers.forEach(num => {
                const ball = document.createElement('div');
                ball.className = 'ball';
                ball.innerText = num;
                ball.style.backgroundColor = getBallColor(num);
                resultDiv.appendChild(ball);
            });
        }

        // 2. 저장 버튼 눌렀을 때만 기록 추가
        function saveLotto() {
            if (currentNumbers.length === 0) {
                alert("먼저 번호를 추첨해주세요!");
                return;
            }
            const historyDiv = document.getElementById('history');
            const p = document.createElement('p');
            p.className = 'history-item';
            p.innerText = `기록: ${currentNumbers.join(', ')}`;
            historyDiv.appendChild(p);
        }
    </script>
</body>
</html>
