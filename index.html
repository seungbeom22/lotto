<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 생성기</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; text-align: center; background-color: #fff9e6; color: #333; padding: 20px; }
        
        /* 공 스타일: 모바일에서도 한 줄로 보이게 width를 40px로 조정 */
        .result-container {
            display: flex;
            justify-content: center;
            gap: 5px;
            flex-wrap: nowrap; /* 핵심: 절대 줄바꿈 안 함 */
            margin: 30px 0;
        }
        .ball {
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; font-size: 16px;
            flex-shrink: 0; /* 공이 찌그러지지 않게 방지 */
        }

        /* 기록 영역 스타일 */
        #history { margin-top: 20px; padding-top: 20px; border-top: 2px dashed #ccc; text-align: left; max-width: 400px; margin-left: auto; margin-right: auto; }
        .history-item { margin: 5px 0; font-size: 14px; }
    </style>
</head>
<body>

    <h1>🎰 로또 생성기</h1>
    <button onclick="generateLotto()" style="padding: 10px 20px; font-size: 18px;">번호 추첨하기</button>

    <div class="result-container" id="result"></div>
    
    <div id="history">
        <h3>📜 추첨 기록</h3>
    </div>

    <script>
        let historyList = []; // 기록 배열

        function getBallColor(num) {
            if (num <= 10) return '#fbc400';
            if (num <= 20) return '#69c8f2';
            if (num <= 30) return '#ff7272';
            if (num <= 40) return '#aaaaaa';
            return '#b0d840';
        }

        function generateLotto() {
            const numbers = [];
            while(numbers.length < 6) {
                const num = Math.floor(Math.random() * 45) + 1;
                if(!numbers.includes(num)) numbers.push(num);
            }
            numbers.sort((a, b) => a - b);

            // 1. 화면에 공 표시
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '';
            numbers.forEach((num, index) => {
                const ball = document.createElement('div');
                ball.className = 'ball';
                ball.innerText = num;
                ball.style.backgroundColor = getBallColor(num);
                resultDiv.appendChild(ball);
            });

            // 2. 기록 저장 및 출력
            historyList.push(numbers.join(', '));
            const historyDiv = document.getElementById('history');
            
            // 기존 <h3>은 유지하고, 그 아래에 새로운 기록 추가
            const p = document.createElement('p');
            p.className = 'history-item';
            p.innerText = `${historyList.length}회차: [ ${numbers.join(', ')} ]`;
            historyDiv.appendChild(p);
        }
    </script>
</body>
</html>
